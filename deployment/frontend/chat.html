<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat with Clara — ClariCare AI Health Assistant</title>
    <meta name="description" content="Talk to Clara, ClariCare's AI health assistant. Describe your symptoms in a natural conversation and receive personalized, responsible health guidance.">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: { 50:'#ecfdf5',100:'#d1fae5',200:'#a7f3d0',300:'#6ee7b7',400:'#34d399',500:'#10b981',600:'#059669',700:'#047857',800:'#065f46',900:'#064e3b' },
                        surface: { 50:'#f8fafc',100:'#f1f5f9',200:'#e2e8f0',300:'#cbd5e1',400:'#94a3b8',500:'#64748b',600:'#475569',700:'#334155',800:'#1e293b',900:'#0f172a' }
                    },
                    fontFamily: { sans:['Inter','system-ui','sans-serif'], display:['Outfit','system-ui','sans-serif'] }
                }
            }
        }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
    <style>
        html, body { height: 100%; margin: 0; overflow: hidden; }
        .chat-page-wrapper { height: calc(100vh - 64px); }
        textarea#chat-input { min-height: 44px; max-height: 120px; resize: none; overflow-y: auto; }
    </style>
</head>
<body class="h-screen overflow-hidden bg-surface-50 font-sans antialiased flex flex-col">

    <!-- ── Navigation ── -->
    <nav class="flex-shrink-0 z-50 border-b border-surface-200 bg-white/90 backdrop-blur-xl" style="height:64px">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-full">
            <div class="flex items-center justify-between h-full">
                <a href="/" class="flex items-center gap-3 group">
                    <div class="w-9 h-9 rounded-xl bg-gradient-to-br from-brand-500 to-emerald-400 flex items-center justify-center shadow-md group-hover:scale-105 transition-transform">
                        <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"/></svg>
                    </div>
                    <div>
                        <p class="font-display font-bold text-lg tracking-tight text-surface-900 leading-none">ClariCare</p>
                        <p class="text-[10px] text-surface-400 font-semibold uppercase tracking-wider">AI Health Guidance</p>
                    </div>
                </a>
                <div class="hidden md:flex items-center gap-7">
                    <a href="/" class="nav-link">Home</a>
                    <a href="/chat" class="nav-link active">Chat</a>
                    <a href="/explore" class="nav-link">Explore</a>
                    <a href="/about" class="nav-link">About</a>
                </div>
                <div id="status-badge" class="flex items-center gap-2 px-3 py-1.5 rounded-full bg-emerald-50 border border-emerald-100">
                    <div class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></div>
                    <span class="text-xs text-emerald-700 font-semibold">System Ready</span>
                </div>
            </div>
        </div>
    </nav>

    <!-- ── Emergency Alert (hidden by default) ── -->
    <div id="emergency-alert" class="hidden emergency-banner flex-shrink-0 z-40">
        <svg class="w-5 h-5 flex-shrink-0 animate-pulse" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/></svg>
        <p class="flex-1">⚠️ <strong>Medical Alert:</strong> Your symptoms may require prompt medical attention. Please contact a healthcare provider or emergency services immediately if symptoms are severe.</p>
        <button onclick="document.getElementById('emergency-alert').classList.add('hidden')" class="text-white/80 hover:text-white text-xl font-bold">&times;</button>
    </div>

    <!-- ── Chat Interface ── -->
    <div class="chat-page-wrapper flex flex-col flex-1 overflow-hidden">

        <!-- Chat Header -->
        <div class="chat-header">
            <div class="flex items-center gap-3">
                <!-- Clara avatar -->
                <div class="relative">
                    <div class="w-10 h-10 rounded-full bg-gradient-to-br from-brand-500 to-emerald-400 flex items-center justify-center shadow-md">
                        <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"/></svg>
                    </div>
                    <div class="absolute -bottom-0.5 -right-0.5 w-3.5 h-3.5 bg-emerald-400 rounded-full border-2 border-white"></div>
                </div>
                <div>
                    <p class="font-display font-bold text-surface-900">Clara</p>
                    <p class="text-xs text-emerald-600 font-semibold flex items-center gap-1.5">
                        <span class="w-1.5 h-1.5 rounded-full bg-emerald-500 inline-block animate-pulse"></span>
                        ClariCare AI · Online
                    </p>
                </div>
            </div>
            <div class="flex items-center gap-3">
                <div class="hidden sm:flex items-center gap-1.5 text-xs text-surface-400 font-medium bg-surface-50 border border-surface-200 px-3 py-1.5 rounded-full">
                    <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
                    <span id="mode-label">BERT + Keyword</span>
                </div>
                <button onclick="newConsultation()" class="flex items-center gap-2 px-4 py-2 rounded-xl bg-surface-100 border border-surface-200 text-surface-600 font-semibold text-sm hover:bg-surface-200 transition-all active:scale-95">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
                    New Consultation
                </button>
            </div>
        </div>

        <!-- Messages Area -->
        <div id="messages-area" class="messages-area bg-surface-50">
            <!-- Messages injected by JS -->
        </div>

        <!-- Quick Replies Bar -->
        <div id="quick-replies-bar" class="hidden quick-replies-bar">
            <!-- Quick reply chips injected by JS -->
        </div>

        <!-- Input Bar -->
        <div class="chat-input-bar">
            <div class="flex-1 relative">
                <textarea
                    id="chat-input"
                    rows="1"
                    class="w-full bg-surface-50 border border-surface-200 rounded-xl px-4 py-3 text-sm text-surface-900 placeholder-surface-400 focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-transparent focus:bg-white transition-all"
                    placeholder="Describe your symptoms or answer Clara's question..."
                ></textarea>
            </div>
            <button
                id="send-btn"
                onclick="sendMessage()"
                class="w-11 h-11 rounded-xl bg-brand-600 hover:bg-brand-500 flex items-center justify-center shadow-md shadow-brand-500/20 transition-all active:scale-95 disabled:opacity-40 disabled:cursor-not-allowed flex-shrink-0"
            >
                <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"/></svg>
            </button>
        </div>
    </div>

    <script src="/static/chat.js"></script>
</body>
</html>
